glossary:
  OC: Orden de Compra (tabla dat_oc). El total incluye IVA sobre ítems afectos
  MOC: Modificación de Orden de Compra (OC con tip_oc de tipo MOC, referencia otra OC vía ref_oc)
  linoc: Línea de Orden de Compra (tabla dat_linoc, detalle/ítem de una OC)
  afecto: Ítem que paga IVA (19%). En dat_linoc, afe_linoc=0 significa AFECTO
  exento: Ítem que NO paga IVA. En dat_linoc, afe_linoc=1 significa EXENTO
  IVA: Impuesto al Valor Agregado, 19% en Chile. Solo se aplica a ítems afectos (afe_linoc=0)
  neto: Monto sin IVA. Fórmula por línea = (precio - precio*descuento/100) * cantidad
  descuento: Porcentaje de descuento (des_linoc). Es un % de 0 a 100, NO un monto fijo
  proveedor: Entidad que suministra bienes o servicios (tabla mae_proveedor)
  contrato: Proyecto/obra con presupuesto asociado (tabla mae_contrato)
  tipoc: Tipo de OC (tabla mae_tipoc). Define si es OC normal, MOC, MDO, Arriendo, etc.
  convert_oc: Factor de conversión de moneda. Si moneda es CLP (mon_oc=1), convert_oc no aplica
  ajuste_linoc: Factor de ajuste por línea. Si ajuste=1, precio ya está en moneda local
  PRP: Presupuesto (tabla dat_prp)
  doc: Documento de recepción (tabla dat_doc)
  ing: Ingreso / bodega (tabla dat_ing)
  fpago: Forma de pago (tabla mae_fpago)
  estados_oc:
    "-1": Anulada
    "0": Aplicada (cerrada/procesada)
    "1": Proveedor
    "2": Compras
    "3": Autorizar (pendiente de autorización)
    "4": Ingresando (en edición)
    "5": Rechazada
    "9": VB OFC (Visto Bueno Oficina)
