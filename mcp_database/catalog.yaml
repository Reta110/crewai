  dat_oc:
    description: Órdenes de Compra - Cabecera. Cada registro es una OC completa con su proveedor, fechas, estado y montos.
    aliases:
    - OC
    - orden de compra
    - orden
    - compra
    - órdenes de compra
    columns:
      id_oc: '[PK] ID interno de la Orden de Compra'
      number: Número visible/correlativo de la OC (el que usan los usuarios)
      con_oc: FK a contrato asociado
      fch_oc: Fecha de emisión de la OC
      pro_oc: FK a proveedor (mae_pro o similar)
      de_oc: Departamento o área solicitante
      ate_oc: Atención / dirigido a (nombre de contacto)
      mai_oc: Email de contacto
      obs_oc: Observaciones generales de la OC
      deg_oc: Desglose/tipo de desglose
      fde_oc: Fecha de entrega solicitada
      die_oc: Dirección de entrega
      est_oc: Estado de la OC (-1=Anulada, 0=Aplicada, 1=Proveedor, 2=Compras, 3=Autorizar, 4=Ingresando, 5=Rechazada, 9=VB OFC)
      usu_oc: Usuario que creó la OC
      ing_oc: FK a dat_ing - Ingreso/bodega destino
      ref_oc: Referencia externa
      aut_oc: Autorizador 1 (FK a usuario)
      tip_oc: FK a mae_tipoc - Tipo de OC
      fao_oc: Forma de adjudicación
      ma2_oc: Email secundario
      mon_oc: Moneda (1=CLP, 2=USD, 3=UF, etc.)
      fpago_oc: FK a mae_fpago - Forma de pago
      au2_oc: Autorizador 2 (FK a usuario)
      glo_oc: Glosa / descripción larga
      company_id: FK a empresa
      numero_iconstruye: Número en sistema iConstruye
      monto_iconstruye: Monto en sistema iConstruye
      convert_oc: Factor de conversión de moneda
      total_oc: Total calculado de la OC (puede estar NULL, calcular desde dat_linoc)
      number: Número correlativo visible de la OC
      prp_oc: FK a dat_prp - Presupuesto asociado
      created_at: Fecha de creación del registro
      updated_at: Fecha de última modificación
      deleted_at: Fecha de eliminación lógica (soft delete)
    relationships:
    - target: dat_linoc
      type: one_to_many
      join: dat_oc.id_oc = dat_linoc.oc_linoc
      description: Líneas de detalle de la OC (ítems, cantidades, precios)
    - target: dat_ing
      type: many_to_one
      join: dat_oc.ing_oc = dat_ing.id_ing
      description: Ingreso/bodega destino
    - target: mae_fpago
      type: many_to_one
      join: dat_oc.fpago_oc = mae_fpago.id_fpago
      description: Forma de pago
    - target: mae_tipoc
      type: many_to_one
      join: dat_oc.tip_oc = mae_tipoc.id_tipoc
      description: Tipo de Orden de Compra
    - target: dat_prp
      type: many_to_one
      join: dat_oc.prp_oc = dat_prp.id_prp
      description: Presupuesto asociado
    calculations:
      neto_por_linea: "(pre_linoc - pre_linoc * des_linoc/100) * can_linoc * (ajuste_linoc + (1-ajuste_linoc) * convert_oc)"
      total_afecto: "SUM(neto_por_linea) WHERE afe_linoc = 0 (NO exento)"
      total_exento: "SUM(neto_por_linea) WHERE afe_linoc = 1 (exento de IVA)"
      iva: "total_afecto * 0.19"
      total_oc: "total_afecto + iva + total_exento"
      total_neto: "total_afecto + total_exento (sin IVA)"
      sql_total_afecto: >
        SELECT SUM(ROUND((l.pre_linoc - l.pre_linoc * l.des_linoc/100) * l.can_linoc
        * (l.ajuste_linoc + (1-l.ajuste_linoc) * o.convert_oc), m.dec_moneda)) as afecto
        FROM dat_linoc l
        JOIN dat_oc o ON l.oc_linoc = o.id_oc
        JOIN mae_moneda m ON o.mon_oc = m.id_moneda
        WHERE l.oc_linoc = <id_oc> AND l.afe_linoc = 0 AND l.deleted_at IS NULL
      sql_total_exento: >
        SELECT SUM(ROUND((l.pre_linoc - l.pre_linoc * l.des_linoc/100) * l.can_linoc
        * (l.ajuste_linoc + (1-l.ajuste_linoc) * o.convert_oc), m.dec_moneda)) as exento
        FROM dat_linoc l
        JOIN dat_oc o ON l.oc_linoc = o.id_oc
        JOIN mae_moneda m ON o.mon_oc = m.id_moneda
        WHERE l.oc_linoc = <id_oc> AND l.afe_linoc = 1 AND l.deleted_at IS NULL
      notas:
        - "des_linoc es un PORCENTAJE (0-100), no un monto fijo"
        - "afe_linoc=1 significa EXENTO de IVA (checkbox 'Exento')"
        - "afe_linoc=0 significa AFECTO a IVA (no exento)"
        - "ajuste_linoc controla conversión de moneda. Si ajuste=0, multiplica por convert_oc"
        - "IVA en Chile es 19% (0.19)"
