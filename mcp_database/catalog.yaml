examples:
- question: "¿Cuál es el total neto afecto de la OC 5?"
  sql: >
    SELECT SUM(ROUND((l.pre_linoc - l.pre_linoc * l.des_linoc/100) * l.can_linoc
    * (l.ajuste_linoc + (1-l.ajuste_linoc) * o.convert_oc), m.dec_moneda)) as afecto
    FROM dat_linoc l
    JOIN dat_oc o ON l.oc_linoc = o.id_oc
    JOIN mae_moneda m ON o.mon_oc = m.id_moneda
    WHERE l.oc_linoc = 5 AND l.afe_linoc = 0 AND l.deleted_at IS NULL
  explanation: >
    El total AFECTO se calcula con la fórmula: (precio - precio*descuento/100) * cantidad * factor_moneda.
    afe_linoc=0 significa AFECTO a IVA. des_linoc es PORCENTAJE (no monto).
    El IVA se calcula aparte: afecto * 0.19. El total final = afecto + iva + exento.

- question: "¿Cuál es el total con IVA de la OC 5?"
  sql: >
    SELECT
      SUM(CASE WHEN l.afe_linoc = 0 THEN ROUND((l.pre_linoc - l.pre_linoc * l.des_linoc/100) * l.can_linoc
        * (l.ajuste_linoc + (1-l.ajuste_linoc) * o.convert_oc), m.dec_moneda) ELSE 0 END) as afecto,
      SUM(CASE WHEN l.afe_linoc = 1 THEN ROUND((l.pre_linoc - l.pre_linoc * l.des_linoc/100) * l.can_linoc
        * (l.ajuste_linoc + (1-l.ajuste_linoc) * o.convert_oc), m.dec_moneda) ELSE 0 END) as exento,
      SUM(CASE WHEN l.afe_linoc = 0 THEN ROUND((l.pre_linoc - l.pre_linoc * l.des_linoc/100) * l.can_linoc
        * (l.ajuste_linoc + (1-l.ajuste_linoc) * o.convert_oc), m.dec_moneda) ELSE 0 END) * 0.19 as iva
    FROM dat_linoc l
    JOIN dat_oc o ON l.oc_linoc = o.id_oc
    JOIN mae_moneda m ON o.mon_oc = m.id_moneda
    WHERE l.oc_linoc = 5 AND l.deleted_at IS NULL
  explanation: >
    Total con IVA = afecto + (afecto * 0.19) + exento.
    afe_linoc=0 → afecto a IVA (19%), afe_linoc=1 → exento de IVA.

- question: "Dame la información de la OC número 10"
  sql: "SELECT * FROM dat_oc WHERE id_oc = 10 AND deleted_at IS NULL"
  explanation: "Cuando el usuario dice 'OC número X', buscar primero por id_oc, luego por number si no se encuentra."

- question: "¿Cuántas líneas tiene la OC 3?"
  sql: "SELECT COUNT(*) as cantidad_lineas FROM dat_linoc WHERE oc_linoc = 3 AND deleted_at IS NULL"
  explanation: "Contar registros en dat_linoc filtrados por oc_linoc (FK a dat_oc.id_oc)"

- question: "¿Cuáles son las OC más recientes?"
  sql: "SELECT id_oc, number, fch_oc, est_oc, glo_oc FROM dat_oc WHERE deleted_at IS NULL ORDER BY fch_oc DESC LIMIT 10"
  explanation: "Listar OC no eliminadas ordenadas por fecha descendente"

- question: "¿Cuántas OC hay en estado Compras?"
  sql: "SELECT COUNT(*) as total FROM dat_oc WHERE est_oc = 2 AND deleted_at IS NULL"
  explanation: >
    Estados: -1=Anulada, 0=Aplicada, 1=Proveedor, 2=Compras, 3=Autorizar,
    4=Ingresando, 5=Rechazada, 9=VB OFC.
    IMPORTANTE: siempre filtrar deleted_at IS NULL.

- question: "Detalle de la OC 7 con sus líneas"
  sql: >
    SELECT l.id_linoc, l.ite_linoc, l.uni_linoc, l.can_linoc, l.pre_linoc,
    l.des_linoc, l.afe_linoc, l.ajuste_linoc,
    ROUND((l.pre_linoc - l.pre_linoc * l.des_linoc/100) * l.can_linoc
    * (l.ajuste_linoc + (1-l.ajuste_linoc) * o.convert_oc), 0) as neto_linea
    FROM dat_linoc l
    JOIN dat_oc o ON l.oc_linoc = o.id_oc
    WHERE l.oc_linoc = 7 AND l.deleted_at IS NULL
  explanation: >
    JOIN entre cabecera y líneas usando dat_linoc.oc_linoc = dat_oc.id_oc.
    El neto por línea aplica descuento porcentual y factor de moneda.

- question: "¿Qué OC tienen ítems exentos de IVA?"
  sql: >
    SELECT DISTINCT o.id_oc, o.glo_oc, o.fch_oc
    FROM dat_oc o
    JOIN dat_linoc l ON l.oc_linoc = o.id_oc AND l.deleted_at IS NULL
    WHERE l.afe_linoc = 1 AND o.deleted_at IS NULL
    ORDER BY o.id_oc DESC LIMIT 20
  explanation: "afe_linoc=1 significa EXENTO de IVA (checkbox 'Exento' marcado en la línea)"
