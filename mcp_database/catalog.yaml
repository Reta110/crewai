  dat_linoc:
    description: Líneas de detalle de Órdenes de Compra. Cada registro es un ítem/producto dentro de una OC.
    aliases:
    - línea de OC
    - detalle de OC
    - ítem de OC
    - línea de orden de compra
    - linoc
    columns:
      id_linoc: '[PK] ID único de la línea'
      oc_linoc: FK a dat_oc.id_oc - Número de OC a la que pertenece esta línea
      ite_linoc: Descripción/nombre del ítem o producto
      uni_linoc: Unidad de medida (UN, KG, MT, LT, etc.)
      can_linoc: Cantidad solicitada
      pre_linoc: Precio unitario
      des_linoc: Porcentaje de descuento (0-100). Es un PORCENTAJE, no un monto fijo
      par_linoc: Partida presupuestaria
      mat_linoc: Código de material/artículo
      afe_linoc: EXENTO de IVA. 1=Exento (NO paga IVA), 0=Afecto (SÍ paga IVA). ATENCIÓN inverso a lo intuitivo
      usu_linoc: Usuario que creó la línea
      ing_linoc: FK a dat_ing - Ingreso/bodega asociado
      cpp_linoc: Centro de costo presupuestario
      lso_linoc: Línea de solicitud de origen
      doc_linoc: FK a dat_doc - Documento de recepción asociado
      fin_linoc: Fecha inicio
      fte_linoc: Fecha término
      car_linoc: Cargo/imputación
      moc_linoc: Moneda de la OC
      ant_linoc: Anticipo
      company_id: FK a empresa
      id_estacion: FK a estación/sucursal
      id_prp: FK a presupuesto (dat_prp)
      created_at: Fecha de creación del registro
      updated_at: Fecha de última modificación
      deleted_at: Fecha de eliminación lógica (soft delete)
      ajuste_linoc: Factor de ajuste de moneda. Si ajuste=0 se multiplica por convert_oc. Si ajuste=1 el precio ya está en moneda local
      deleted_by_user_id: Usuario que eliminó el registro
    relationships:
    - target: dat_oc
      type: many_to_one
      join: dat_linoc.oc_linoc = dat_oc.id_oc
      description: OC a la que pertenece esta línea
    - target: dat_ing
      type: many_to_one
      join: dat_linoc.ing_linoc = dat_ing.id_ing
      description: Ingreso/bodega asociado
    - target: dat_doc
      type: many_to_one
      join: dat_linoc.doc_linoc = dat_doc.id_doc
      description: Documento de recepción asociado
    calculations:
      neto_linea: "(pre_linoc - pre_linoc * des_linoc/100) * can_linoc * (ajuste_linoc + (1-ajuste_linoc) * convert_oc)"
      subtotal_sin_descuento: "can_linoc * pre_linoc"
      notas:
        - "des_linoc es PORCENTAJE (ej: 10 = 10% de descuento)"
        - "afe_linoc=1 → exento de IVA, afe_linoc=0 → afecto a IVA (19%)"
        - "Para el total de la OC, ver calculations en dat_oc"
